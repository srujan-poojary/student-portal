<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal - Uploads</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8;
    }

    .sidebar {
      height: 100vh;
      width: 250px;
      position: fixed;
      top: 0;
      left: 0;
      background: #1f2937;
      color: #fff;
      display: flex;
      flex-direction: column;
      padding-top: 1.5rem;
      box-shadow: 2px 0 6px rgba(0, 0, 0, 0.2);
      overflow-y: auto;
    }

    .sidebar img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 10px;
      border: 3px solid #fff;
    }

    .sidebar h5 {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .sidebar hr {
      border-color: rgba(255, 255, 255, 0.15);
      margin: 1rem 0;
    }

    .sidebar a {
      display: block;
      color: #cbd5e1;
      padding: 12px 20px;
      text-decoration: none;
      font-size: 15px;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #374151;
      color: #fff;
      border-left: 3px solid #0d6efd;
    }

    .content {
      margin-left: 250px;
      padding: 30px;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .recent-uploads {
      margin-top: 2rem;
    }

    .recent-uploads ul {
      list-style: none;
      padding-left: 0;
    }

    .recent-uploads li {
      padding: 10px 15px;
      background-color: #fff;
      border: 1px solid #e0e0e0;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .recent-uploads .doc-name {
      font-weight: 500;
    }

    .recent-uploads .doc-date {
      font-size: 0.85rem;
      color: #6c757d;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <img src="https://randomuser.me/api/portraits/men/31.jpg" alt="Student Photo" />
    <h5>Arjun Mehta</h5>
    <hr />
    <a href="index.html"><i class="bi bi-house-door me-2"></i> Home</a>
    <a href="attendance.html"><i class="bi bi-clipboard-check me-2"></i> Attendance</a>
    <a href="results.html"><i class="bi bi-bar-chart-line me-2"></i> Results</a>
    <a href="profile.html"><i class="bi bi-person-badge me-2"></i> Profile</a>
    <a href="timetable.html"><i class="bi bi-calendar-week me-2"></i> Timetable</a>
    <a href="fees.html"><i class="bi bi-cash-stack me-2"></i> Fee Payment</a>
    <a href="library.html"><i class="bi bi-book me-2"></i> Library</a>
    <a href="notices.html"><i class="bi bi-bell me-2"></i> Notices</a>
    <a href="placement.html"><i class="bi bi-briefcase me-2"></i> Placement</a>
    <a href="uploads.html" class="active"><i class="bi bi-upload me-2"></i> Uploads</a>
    <a href="logout.html"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
  </div>

  <div class="content">
    <h2 class="mb-4"><i class="bi bi-upload"></i> Uploads</h2>

    <!-- Upload Form -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Upload Documents</h5>
        <form>
          <div class="mb-3">
            <label for="uploadType" class="form-label">Select Document Type</label>
            <select class="form-select" id="uploadType" required>
              <option selected disabled>Choose...</option>
              <option>ID Card</option>
              <option>Bonafide Certificate</option>
              <option>Resume</option>
              <option>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="fileInput" class="form-label">Select File</label>
            <input class="form-control" type="file" id="fileInput" required>
          </div>
          <button type="submit" class="btn btn-primary">Upload</button>
        </form>
      </div>
    </div>

    <!-- Recent Uploads -->
    <div class="recent-uploads">
      <h5><i class="bi bi-clock-history me-2"></i>Recent Uploads</h5>
      <ul>
        <li>
          <span class="doc-name">Bonafide_Certificate.pdf</span>
          <span class="doc-date">28 Sep 2025</span>
        </li>
        <li>
          <span class="doc-name">Resume_2025.pdf</span>
          <span class="doc-date">26 Sep 2025</span>
        </li>
        <li>
          <span class="doc-name">IDCard_Scan.jpg</span>
          <span class="doc-date">22 Sep 2025</span>
        </li>
      </ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
